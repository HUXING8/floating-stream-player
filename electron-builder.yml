appId: com.huxing.floating-stream-player
productName: FloatingStreamPlayer
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

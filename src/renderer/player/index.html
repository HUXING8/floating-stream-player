<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>悬浮播放器</title>
    <link rel="stylesheet" href="./player.css" />
  </head>
  <body>
    <div id="root">
      <div id="content">
        <video id="video" playsinline></video>
        <div id="page-clip"></div>
        <div id="status" class="status"></div>
      </div>
      <div id="toolbar">
        <div id="drag" class="drag" title="拖动">⠿</div>
        <input id="url" type="text" placeholder="粘贴直播/视频地址，回车播放" />
        <button id="play" title="播放">播放</button>
        <button id="login-btn" title="打开登录窗口" style="display: none">登录</button>
        <label class="chk" id="pure-wrap" style="display: none">
          <input type="checkbox" id="pure-chk" checked /><span>纯视频</span>
        </label>
        <label class="chk"><input type="checkbox" id="passthrough-chk" /><span>穿透</span></label>
        <button id="min-btn" title="最小化到角标">—</button>
        <button id="settings-btn" title="设置">⚙</button>
        <button id="close-btn" title="关闭">×</button>
      </div>
    </div>
    <div id="collapsed-icon" title="点击展开">▶</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
